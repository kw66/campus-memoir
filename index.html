<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>校园回忆录</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg?v=20260618a" />
    <link rel="stylesheet" href="./src/styles.css?v=20260620f" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button class="school-button" id="schoolButton" type="button">选择学校</button>
          <button class="secondary-button compact" id="gameInfoButton" type="button" aria-expanded="false">信息与设置</button>
        </div>
        <div class="topbar-actions">
          <button class="primary-button compact" id="editorToggleButton" type="button">进入地图编辑</button>
        </div>
      </header>

      <section class="game-info-panel" id="gameInfoPanel" aria-label="信息与设置" aria-modal="true" role="dialog" hidden>
        <div class="game-info-dialog">
          <div class="game-info-head">
            <strong>信息与设置</strong>
            <button class="secondary-button compact" id="gameInfoCloseButton" type="button">收起</button>
          </div>
          <div class="game-info-tabs" role="tablist" aria-label="信息与设置分类">
            <button class="game-info-tab active" id="gameInfoTabAuthor" data-game-info-tab="author" role="tab" aria-controls="gameInfoPageAuthor" aria-selected="true" type="button">作者</button>
            <button class="game-info-tab" id="gameInfoTabInfo" data-game-info-tab="info" role="tab" aria-controls="gameInfoPageInfo" aria-selected="false" type="button">信息</button>
            <button class="game-info-tab" id="gameInfoTabStats" data-game-info-tab="stats" role="tab" aria-controls="gameInfoPageStats" aria-selected="false" type="button">统计</button>
          </div>
          <div class="game-info-content">
            <div class="game-info-page author-page" id="gameInfoPageAuthor" data-game-info-page="author" role="tabpanel" aria-labelledby="gameInfoTabAuthor">
              <article class="game-info-card author-card">
                <p class="author-inline"><strong>作者</strong><a href="https://xhslink.com/m/A2DFslJF4mb" target="_blank" rel="noreferrer">落星峦</a></p>
                <p class="author-inline"><a href="https://kw66.github.io/games/" target="_blank" rel="noreferrer">作者游戏合集</a></p>
              </article>
              <article class="game-info-card project-card">
                <p><a href="https://github.com/kw66/campus-memoir" target="_blank" rel="noreferrer"><span>项目地址</span><em>（求个star⭐）</em></a></p>
                <p><a href="http://xhslink.com/o/4Eu9wpXB70J" target="_blank" rel="noreferrer"><span>小红书交流帖</span><em>（求点赞❤️）</em></a></p>
              </article>
            </div>
            <div class="game-info-page info-page" id="gameInfoPageInfo" data-game-info-page="info" role="tabpanel" aria-labelledby="gameInfoTabInfo" hidden>
              <article class="game-info-card album-card">
                <div class="album-card-head">
                  <h2>游戏资料库</h2>
                  <span class="album-status" id="albumStatus">检测中</span>
                </div>
                <p id="albumDescription">地图、结构、照片原图和游戏数据可同步到本机文件夹。</p>
                <div class="album-actions">
                  <button class="secondary-button compact" id="albumChooseButton" type="button">选择资料库</button>
                  <button class="secondary-button compact" id="libraryOpenButton" type="button">打开资料库</button>
                  <button class="secondary-button compact" id="albumReconnectButton" type="button">重连</button>
                  <button class="secondary-button compact" id="librarySyncButton" type="button">同步</button>
                  <button class="secondary-button compact" id="libraryRestoreButton" type="button">恢复</button>
                  <button class="secondary-button compact danger" id="albumForgetButton" type="button">关闭</button>
                </div>
                <div class="library-browser" id="libraryBrowser" hidden></div>
              </article>
            </div>
            <div class="game-info-page stats-page" id="gameInfoPageStats" data-game-info-page="stats" role="tabpanel" aria-labelledby="gameInfoTabStats" hidden>
              <article class="game-info-card stats-card">
                <h2>校园足迹</h2>
                <div class="stats-panel" id="globalStatsPanel" aria-live="polite"></div>
                <p class="stats-note" id="globalStatsStatus">正在读取校园足迹...</p>
              </article>
            </div>
          </div>
        </div>
      </section>

      <main class="game-layout" aria-label="校园回忆录主界面">
        <section class="map-panel" aria-label="地图区域">
          <div class="map-toolbar" id="mapToolbar" hidden>
            <div class="exploration-progress" id="explorationProgress" hidden>
              <div class="exploration-progress-row">
                <span>探索</span>
                <strong id="explorationProgressText">0%</strong>
              </div>
              <div class="exploration-progress-track" aria-hidden="true">
                <span id="explorationProgressFill"></span>
              </div>
            </div>
          </div>
          <div class="map-frame" id="mapFrame">
            <canvas class="map-canvas" id="mapCanvas"></canvas>
            <output class="map-zoom-readout" id="zoomReadout">100%</output>
            <div class="map-actions" id="mapActions" hidden>
              <button class="map-action-button" id="mapPhotoButton" type="button">拍照点</button>
              <label class="map-action-toggle"><input id="mapAnnotationToggle" type="checkbox" checked />标注</label>
              <label class="map-action-toggle" hidden><input id="mapExplorationGridToggle" type="checkbox" />探索</label>
            </div>
            <div class="current-school" id="currentSchool">未选择学校</div>
            <div class="map-empty" id="mapEmpty">
              <div>请选择或新建学校</div>
            </div>
          </div>
        </section>

        <aside class="info-panel" aria-label="信息区域">
          <div class="panel-header" id="panelHeader">
            <div>
              <div class="info-heading" id="panelKicker">信息</div>
              <h1 id="infoTitle">等待选择学校</h1>
            </div>
          </div>

          <div class="info-body" id="infoBody">左上角选择学校，或新建一个学校并导入大地图图片。</div>
          <div class="game-panel" id="gamePanel" hidden></div>

          <input id="spotPhotoInput" type="file" accept="image/*" multiple hidden />
          <input id="spotCameraInput" type="file" accept="image/*" capture="environment" hidden />
          <input id="buildingPhotoInput" type="file" accept="image/*" multiple hidden />
          <input id="buildingCameraInput" type="file" accept="image/*" capture="environment" hidden />
          <input id="roomPhotoInput" type="file" accept="image/*" multiple hidden />
          <input id="roomCameraInput" type="file" accept="image/*" capture="environment" hidden />
          <input id="itemPhotoInput" type="file" accept="image/*" multiple hidden />
          <input id="itemCameraInput" type="file" accept="image/*" capture="environment" hidden />
          <input id="playerPortraitInput" type="file" accept="image/*" hidden />
          <input id="playerPortraitCameraInput" type="file" accept="image/*" capture="user" hidden />
          <input id="personPhotoInput" type="file" accept="image/*" hidden />
          <input id="personCameraInput" type="file" accept="image/*" capture="environment" hidden />

          <div class="missing-map-actions" id="missingMapActions" hidden>
            <button class="primary-button" id="reimportMapButton" type="button">重新导入地图图片</button>
            <input id="reimportMapInput" type="file" accept="image/*" hidden />
          </div>

          <div class="editor-panel" id="editorPanel" hidden>
            <section class="editor-section editor-layer-bar" aria-label="编辑对象">
              <button class="layer-toggle active" id="showBaseLayer" type="button" aria-pressed="true">底图</button>
              <button class="layer-toggle" id="showStructureLayer" type="button" aria-pressed="false">结构图</button>
            </section>

            <div class="editor-mode-tabs" role="radiogroup" aria-label="地图编辑模式">
              <button class="mode-tab active" data-editor-layer="base" data-editor-mode="crop" type="button">裁剪</button>
              <button class="mode-tab" data-editor-layer="base" data-editor-mode="rotate" type="button">旋转</button>
              <button class="mode-tab" data-editor-layer="base" data-editor-mode="base" type="button">绘制</button>
              <button class="mode-tab" data-editor-layer="base" data-editor-mode="color" type="button">替换</button>
              <button class="mode-tab" data-editor-layer="structure" data-editor-mode="structure" type="button" hidden>绘制</button>
              <button class="mode-tab" data-editor-layer="structure" data-editor-mode="structureDisplay" type="button" hidden>显示</button>
            </div>

            <section class="editor-section editor-workspace" data-editor-panel="crop">
              <div class="tool-grid single-row" role="radiogroup" aria-label="底图裁剪工具">
                <button class="tool-button" data-tool="pan" type="button">拖动</button>
                <button class="tool-button" data-tool="crop" type="button">选区</button>
              </div>
              <div class="tool-grid single-row">
                <button class="secondary-button" id="commitCropButton" type="button">裁剪</button>
                <button class="secondary-button" id="undoCropButton" type="button">撤销</button>
                <button class="primary-button" id="saveCropButton" type="button">保存</button>
              </div>
            </section>

            <section class="editor-section editor-workspace" data-editor-panel="rotate" hidden>
              <div class="field-row rotate-angle-row">
                <label for="rotateAngleInput">角度</label>
                <input id="rotateAngleInput" type="range" min="-180" max="180" step="1" value="0" />
                <input id="rotateAngleNumber" class="compact-number" type="number" min="-180" max="180" step="1" value="0" aria-label="旋转角度" />
              </div>
              <div class="tool-grid single-row">
                <button class="secondary-button" id="rotateLeftButton" type="button">左转90</button>
                <button class="secondary-button" id="rotateRightButton" type="button">右转90</button>
                <button class="secondary-button" id="undoRotateButton" type="button">撤销</button>
                <button class="primary-button" id="saveRotateButton" type="button">保存</button>
              </div>
            </section>

            <section class="editor-section editor-workspace" data-editor-panel="base" hidden>
              <div class="tool-grid" role="radiogroup" aria-label="底图画笔工具">
                <button class="tool-button" data-tool="pan" type="button">拖动</button>
                <button class="tool-button" data-tool="eyedropper" type="button" title="长按可跨页面取色">取色器</button>
                <button class="tool-button" data-tool="paint" type="button">画笔</button>
                <button class="tool-button" data-tool="erase" type="button">橡皮擦</button>
              </div>
              <div class="field-row">
                <label for="brushSize">粗细</label>
                <input id="brushSize" type="range" min="2" max="120" value="24" />
                <output id="brushSizeReadout">24</output>
              </div>
              <div class="color-panel">
                <label class="editor-color-field">
                  <span>颜色</span>
                  <input class="editor-color-input" data-editor-color-input="target" type="color" value="#f5e9bd" aria-label="底图绘制颜色" />
                </label>
                <div class="palette-block">
                  <div class="palette-label">图中颜色</div>
                  <div class="swatches" data-palette="image" aria-label="图中颜色"></div>
                </div>
              </div>
              <div class="tool-grid single-row">
                <button class="secondary-button" id="undoBaseButton" type="button">撤销</button>
                <button class="primary-button" id="saveBaseButton" type="button">保存</button>
              </div>
            </section>

            <section class="editor-section editor-workspace" data-editor-panel="color" hidden>
              <div class="tool-grid" role="radiogroup" aria-label="颜色区域工具">
                <button class="tool-button" data-tool="pan" type="button">拖动</button>
                <button class="tool-button" data-tool="eyedropper" type="button" title="长按可跨页面取色">取色器</button>
                <button class="tool-button" data-tool="fillArea" type="button">区域涂色</button>
                <button class="tool-button" data-tool="colorConnected" type="button">联通同色</button>
                <button class="tool-button" data-tool="colorAll" type="button">全部同色</button>
              </div>
              <div class="segmented-row" aria-label="区域形状">
                <button class="shape-toggle active" data-area-shape="polygon" type="button">多边形</button>
                <button class="shape-toggle" data-area-shape="rect" type="button">矩形</button>
                <button class="shape-toggle" data-area-shape="ellipse" type="button">椭圆</button>
              </div>
              <div class="color-panel">
                <label class="editor-color-field">
                  <span>颜色</span>
                  <input class="editor-color-input" data-editor-color-input="target" type="color" value="#f5e9bd" aria-label="颜色替换目标颜色" />
                </label>
                <div class="palette-block">
                  <div class="palette-label">图中颜色</div>
                  <div class="swatches" data-palette="image" aria-label="图中颜色"></div>
                </div>
              </div>
              <div class="tool-grid single-row">
                <button class="secondary-button" id="commitBaseRegionButton" type="button">确定区域</button>
                <button class="secondary-button" id="undoColorButton" type="button">撤销</button>
                <button class="primary-button" id="saveColorButton" type="button">保存</button>
              </div>
            </section>

            <section class="editor-section editor-workspace" data-editor-panel="structure" hidden>
              <div class="structure-object-form">
                <input id="structureObjectNameInput" type="text" autocomplete="off" placeholder="对象名称" />
                <select id="structureObjectTypeInput">
                  <option value="building">建筑</option>
                  <option value="road">道路</option>
                  <option value="bridge">桥</option>
                  <option value="water">水体</option>
                  <option value="field">操场/场地</option>
                  <option value="green">草地</option>
                  <option value="wall">围墙</option>
                  <option value="gate">门</option>
                  <option value="custom">自定义</option>
                </select>
                <input id="structureObjectColorInput" type="color" value="#b75243" aria-label="对象颜色" />
              </div>
              <div class="structure-object-actions">
                <button class="secondary-button" id="addStructureObjectButton" type="button">新增</button>
                <button class="secondary-button" id="saveStructureObjectButton" type="button">保存</button>
                <button class="secondary-button danger" id="deleteStructureObjectButton" type="button">删除</button>
              </div>
              <div class="tool-grid" role="radiogroup" aria-label="结构图工具">
                <button class="tool-button" data-tool="pan" type="button">拖动</button>
                <button class="tool-button" data-tool="structurePolygon" type="button">多边形</button>
                <button class="tool-button" data-tool="structureLine" type="button">线段</button>
                <button class="tool-button" data-tool="structureParallelogram" type="button">平行四边形</button>
                <button class="tool-button" data-tool="structureBrush" type="button">画笔</button>
                <button class="tool-button" data-tool="structureErase" type="button">橡皮擦</button>
                <button class="tool-button" data-tool="sameColorConnected" type="button">联通同色</button>
                <button class="tool-button" data-tool="sameColorAll" type="button">全部同色</button>
              </div>
              <div class="field-row structure-brush-size-row">
                <label for="structureBrushSize">粗细</label>
                <input id="structureBrushSize" type="range" min="2" max="120" value="24" />
                <output id="structureBrushSizeReadout">24</output>
              </div>
              <label class="check-row compact-check">
                <input id="structureObjectWalkableInput" type="checkbox" checked />
                <span>当前对象可通行</span>
              </label>
              <div class="field-row" hidden>
                <label for="colorTolerance">容差</label>
                <input id="colorTolerance" type="range" min="0" max="32" value="8" />
                <output id="colorToleranceReadout">8</output>
              </div>
              <div class="button-row">
                <button class="secondary-button" id="commitStructureRegionButton" type="button">添加区域</button>
                <button class="secondary-button" id="undoEditButton" type="button">撤销</button>
                <button class="secondary-button danger" id="clearDraftButton" type="button">清除草稿</button>
              </div>
              <div class="button-row structure-visibility-actions">
                <button class="secondary-button" id="showAllStructureButton" type="button">一键启用</button>
                <button class="secondary-button" id="hideAllStructureButton" type="button">一键隐藏</button>
              </div>
              <div class="structure-object-list" id="structureObjectList"></div>
              <div class="structure-list-pager" id="structureListPager">
                <button class="secondary-button" id="structureListPrevButton" type="button">上一页</button>
                <output id="structureListPageReadout">1 / 1</output>
                <button class="secondary-button" id="structureListNextButton" type="button">下一页</button>
              </div>
              <div class="editor-status" id="editorStatus" hidden></div>
            </section>

            <section class="editor-section editor-workspace" data-editor-panel="structureDisplay" hidden>
              <div class="field-row opacity-row">
                <label for="baseOpacityInput">底图</label>
                <input id="baseOpacityInput" type="range" min="0" max="100" value="45" />
                <output id="baseOpacityReadout">45%</output>
              </div>
            </section>
          </div>
        </aside>
      </main>
    </div>

    <dialog class="school-dialog" id="schoolDialog" aria-label="选择或构建你的校园">
      <form method="dialog" class="dialog-shell" id="schoolForm">
        <div class="dialog-header">
          <strong>选择/构建你的校园</strong>
          <button class="icon-button" id="closeDialogButton" type="button" aria-label="关闭">×</button>
        </div>

        <div class="dialog-grid">
          <section class="dialog-section school-picker">
            <div class="school-list" id="schoolList"></div>
            <div class="school-picker-actions">
              <button class="school-card create-card active" id="newSchoolChoiceButton" type="button">+ 新建</button>
              <button class="school-card download-card" id="downloadCatalogButton" type="button">下载内置地图</button>
            </div>
          </section>

          <section class="dialog-section campus-form-panel" id="campusFormPanel">
            <input id="resourceImportInput" type="file" multiple hidden />

            <div class="bulk-actions">
              <button class="secondary-button" id="bulkImportButton" type="button">导入</button>
              <button class="secondary-button" id="bulkExportButton" type="button">导出</button>
              <button class="secondary-button danger" id="bulkDeleteButton" type="button">删除</button>
            </div>
            <div class="resource-hint">勾选已有资源后可导出或删除。</div>

            <div class="resource-row name-row">
              <div class="resource-label">学校名称</div>
              <div class="resource-info">
                <input id="schoolNameInput" name="schoolName" type="text" autocomplete="off" placeholder="例如：中国科学技术大学高新校区" />
              </div>
              <label class="resource-check">
                <input class="resource-select" type="checkbox" data-resource="school" />
                <span class="sr-only">选择学校名称</span>
              </label>
            </div>

            <div class="resource-row">
              <div class="resource-label">大地图图片</div>
              <div class="resource-info">
                <span id="mapResourceInfo">未导入</span>
              </div>
              <label class="resource-check">
                <input class="resource-select" type="checkbox" data-resource="map" />
                <span class="sr-only">选择大地图图片</span>
              </label>
            </div>

            <div class="resource-row">
              <div class="resource-label">地图结构</div>
              <div class="resource-info">
                <span id="structureResourceInfo">未导入</span>
              </div>
              <label class="resource-check">
                <input class="resource-select" type="checkbox" data-resource="structure" />
                <span class="sr-only">选择地图结构</span>
              </label>
            </div>

            <div class="resource-row dependent-row">
              <div class="resource-label">其他图片</div>
              <div class="resource-info">
                <span id="extraImagesResourceInfo">未导入</span>
              </div>
              <label class="resource-check">
                <input class="resource-select" type="checkbox" data-resource="extraImages" />
                <span class="sr-only">选择其他图片</span>
              </label>
            </div>

            <div class="resource-row dependent-row">
              <div class="resource-label">人物关系</div>
              <div class="resource-info">
                <span id="peopleResourceInfo">未导入</span>
              </div>
              <label class="resource-check">
                <input class="resource-select" type="checkbox" data-resource="people" />
                <span class="sr-only">选择人物关系</span>
              </label>
            </div>

            <div class="form-note" id="formNote">必填：名称、大图。</div>
            <div class="download-progress import-progress" id="importProgress" hidden>
              <div class="download-progress-track" aria-hidden="true"><span id="importProgressFill"></span></div>
              <span class="download-progress-text" id="importProgressText"></span>
            </div>
            <div class="form-footer">
              <button class="primary-button" id="createSchoolButton" type="submit">创建并进入</button>
              <button class="secondary-button" id="saveSchoolButton" type="button">保存</button>
            </div>
          </section>

          <section class="dialog-section download-panel" id="downloadPanel" hidden>
            <div class="download-list" id="downloadList"></div>
          </section>
        </div>
      </form>
    </dialog>

    <script src="./src/app.js?v=20260620f"></script>
  </body>
</html>
